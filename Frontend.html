<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registration - GreenCycle</title>
    <style>
        
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #4B0082, #FFD700); 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }

        .container {
            width: 350px;
            background: white;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .container h1 {
            color: #4B0082; 
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .btn {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            background-color: #4B0082; 
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #800000;
        }

        .switch {
            margin-top: 1rem;
            color: #333;
            font-size: 0.9rem;
        }

        .switch a {
            color: #4B0082;
            text-decoration: none;
            font-weight: bold;
        }

        .switch a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
   
    <div class="container" id="login">
        <h1>Login</h1>
        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        <p class="switch">
            Don't have an account? <a href="#" onclick="showRegister()">Register Here</a>
        </p>
    </div>

    
    <div class="container" id="register" style="display: none;">
        <h1>Register</h1>
        <form>
            <div class="form-group">
                <label for="register-name">Full Name</label>
                <input type="text" id="register-name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="register-email">Email</label>
                <input type="email" id="register-email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="register-password">Password</label>
                <input type="password" id="register-password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">Register</button>
        </form>
        <p class="switch">
            Already have an account? <a href="#" onclick="showLogin()">Login Here</a>
        </p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault(); 
            window.location.href = 'dashboard.html'; 
        });    
        
        const loginContainer = document.getElementById('login');
        const registerContainer = document.getElementById('register');

        function showRegister() {
            loginContainer.style.display = 'none';
            registerContainer.style.display = 'block';
        }

        function showLogin() {
            registerContainer.style.display = 'none';
            loginContainer.style.display = 'block';
        }
    </script>
</body>

</html>
